<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서</title>

<!-- ✅ 캡쳐용 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
button { width:100%; padding:12px; margin-top:10px; font-size:16px; }

.preview {
  margin-top:20px;
  padding:15px;
  border:1px solid #ccc;
  background:#f9f9f9;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}
td, th {
  border:1px solid #000;
  padding:5px;
  text-align:center;
}
</style>
</head>

<body>

<h2>견적서 작성</h2>

<input id="client" placeholder="수신처">
<input id="email" placeholder="이메일">
<input id="phone" placeholder="연락처">

<input id="item" placeholder="항목">
<input id="price" type="number" placeholder="단가">
<input id="qty" type="number" placeholder="수량">

<textarea id="note" placeholder="기타사항"></textarea>

<button onclick="preview()">미리보기</button>

<div class="preview" id="preview"></div>

<button onclick="sendEmail()">이메일 발송</button>
<p id="result"></p>

<script>
// ✅ 미리보기 (절대 오류 안 나게 안정화)
function preview(){
  try {
    let client = document.getElementById('client').value || "";
    let email = document.getElementById('email').value || "";
    let item = document.getElementById('item').value || "";
    let price = Number(document.getElementById('price').value) || 0;
    let qty = Number(document.getElementById('qty').value) || 0;
    let note = document.getElementById('note').value || "";

    let total = price * qty;
    let vat = Math.floor(total * 0.1);
    let final = total + vat;

    document.getElementById('preview').innerHTML = `
      <h3>견적서</h3>
      <p><strong>수신처</strong> : ${client}</p>
      <p><strong>Email</strong> : ${email}</p>

      <table>
        <tr>
          <th>항목</th>
          <th>단가</th>
          <th>수량</th>
          <th>금액</th>
        </tr>
        <tr>
          <td>${item}</td>
          <td>${price.toLocaleString()}</td>
          <td>${qty}</td>
          <td>${total.toLocaleString()}</td>
        </tr>
      </table>

      <p>공급가액: ${total.toLocaleString()}</p>
      <p>부가세: ${vat.toLocaleString()}</p>
      <h3>총액: ${final.toLocaleString()}</h3>

      <p>${note}</p>
    `;
  } catch(e){
    console.log(e);
    alert("미리보기 오류 발생");
  }
}

// ✅ 이메일 발송 + 이미지 첨부
async function sendEmail(){

  let email = document.getElementById('email').value;

  if(!email || !email.includes("@")){
    alert("올바른 이메일을 입력하세요");
    return;
  }

  try {
    let element = document.getElementById("preview");

    // 👉 미리보기 먼저 생성 안 했으면 자동 실행
    if(!element.innerHTML){
      preview();
    }

    // 👉 화면 캡쳐
    let canvas = await html2canvas(element);
    let imageData = canvas.toDataURL("image/png");

    let data = {
      client: document.getElementById('client').value,
      email: email,
      item: document.getElementById('item').value,
      price: document.getElementById('price').value,
      qty: document.getElementById('qty').value,
      image: imageData
    };

    let res = await fetch('/api/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });

    if(!res.ok){
      throw new Error("서버 오류");
    }

    let result = await res.json();

    if(result.success){
      document.getElementById('result').innerText = "✅ 발송 완료";
    } else {
      document.getElementById('result').innerText = "❌ 발송 실패";
    }

  } catch (error) {
    console.log(error);
    document.getElementById('result').innerText = "❌ 서버 오류 발생";
  }
}
</script>

</body>
</html>
